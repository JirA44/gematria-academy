<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les 12 Signes du Zodiaque | Gematria Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 2px solid rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 2.8em;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.4);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(99, 102, 241, 0.4);
            transform: translateY(-3px);
        }

        .zodiac-wheel {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 40px auto;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 3px solid rgba(99, 102, 241, 0.4);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a3e, #0f0f23);
            border: 2px solid rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .wheel-sign {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 50%;
        }

        .wheel-sign:hover {
            transform: scale(1.3);
            background: rgba(99, 102, 241, 0.3);
        }

        .element-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .element-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .element-btn:hover, .element-btn.active {
            transform: translateY(-3px);
        }

        .element-btn.fire { border-color: #ef4444; }
        .element-btn.fire:hover, .element-btn.fire.active { background: rgba(239, 68, 68, 0.3); }
        .element-btn.earth { border-color: #22c55e; }
        .element-btn.earth:hover, .element-btn.earth.active { background: rgba(34, 197, 94, 0.3); }
        .element-btn.air { border-color: #3b82f6; }
        .element-btn.air:hover, .element-btn.air.active { background: rgba(59, 130, 246, 0.3); }
        .element-btn.water { border-color: #06b6d4; }
        .element-btn.water:hover, .element-btn.water.active { background: rgba(6, 182, 212, 0.3); }

        .signs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .sign-card {
            background: linear-gradient(145deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.05));
            border-radius: 20px;
            padding: 25px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .sign-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }

        .sign-card.fire { border-color: rgba(239, 68, 68, 0.4); }
        .sign-card.earth { border-color: rgba(34, 197, 94, 0.4); }
        .sign-card.air { border-color: rgba(59, 130, 246, 0.4); }
        .sign-card.water { border-color: rgba(6, 182, 212, 0.4); }

        .sign-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .sign-symbol {
            font-size: 3.5em;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
        }

        .sign-info h2 {
            font-size: 1.6em;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sign-dates {
            opacity: 0.7;
            font-size: 0.95em;
            margin-top: 5px;
        }

        .sign-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .tag.element { background: rgba(99, 102, 241, 0.2); }
        .tag.modality { background: rgba(168, 85, 247, 0.2); }
        .tag.planet { background: rgba(236, 72, 153, 0.2); }

        .sign-description {
            line-height: 1.7;
            opacity: 0.9;
            margin: 15px 0;
        }

        .sign-traits {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .traits-column h4 {
            font-size: 0.9em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .traits-column.positive h4 { color: #22c55e; }
        .traits-column.negative h4 { color: #ef4444; }

        .traits-column ul {
            list-style: none;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .traits-column li {
            padding: 3px 0;
        }

        .sign-details {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }

        .sign-card.expanded .sign-details {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .correspondences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .correspondence {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .correspondence .label {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .correspondence .value {
            color: #a855f7;
            font-weight: bold;
        }

        .compatibility-section {
            margin-top: 20px;
        }

        .compatibility-section h4 {
            color: #ec4899;
            margin-bottom: 10px;
        }

        .compat-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .compat-sign {
            background: rgba(236, 72, 153, 0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .signs-grid { grid-template-columns: 1fr; }
            .zodiac-wheel { width: 300px; height: 300px; }
            .wheel-center { width: 100px; height: 100px; font-size: 2em; }
            .wheel-sign { font-size: 1.3em; }
        }
    </style>
</head>
<body>

            <p style="font-size: 1.2em; opacity: 0.9;">Découvrez les caractéristiques de chaque signe astrologique</p>
        </header>

        <nav class="nav-buttons">

        <!-- Filtres par élément -->

        </div>

        <!-- Grille des signes -->
        <div class="signs-grid" id="signsGrid">

    </div>

            {
                name: "Vierge",
                symbol: "♍",
                dates: "23 août - 22 septembre",
                element: "earth",
                modality: "Mutable",
                planet: "Mercure",
                description: "La Vierge symbolise l'analyse, le service et la perfection. Méthodique et pratique, elle excelle dans l'organisation et l'amélioration.",
                positive: ["Analytique", "Pratique", "Serviable", "Méticuleux", "Intelligent"],

            {

                description: "Le Sagittaire symbolise l'aventure, la philosophie et l'expansion. Optimiste et libre, il part en quête de sens et de nouvelles horizons.",

            {
                name: "Capricorne",

                name: "Poissons",

                dates: "19 février - 20 mars",
                element: "water",

                planet: "Neptune/Jupiter",
                description: "Les Poissons symbolisent la spiritualité, la compassion et l'imaginaire. Intuitifs et empathiques, ils sont connectés à l'invisible.",
                positive: ["Intuitif", "Compassionnel", "Artistique", "Spirituel", "Adaptable"],
                negative: ["Rêveur", "Évasif", "Influençable", "Martyr"],
                stone: "Aigue-marine",
                color: "Turquoise",
                day: "Jeudi",
                body: "Pieds",
                compatible: ["Cancer", "Scorpion", "Taureau", "Capricorne"]
            }
        ];

        // Générer la roue
        function generateWheel() {
            const wheel = document.getElementById('zodiacWheel');
            const radius = 160;

            zodiacSigns.forEach((sign, index) => {
                const angle = (index * 30 - 90) * (Math.PI / 180);
                const x = 175 + radius * Math.cos(angle);
                const y = 175 + radius * Math.sin(angle);

                const signEl = document.createElement('div');
                signEl.className = 'wheel-sign';
                signEl.textContent = sign.symbol;
                signEl.style.left = `${x}px`;
                signEl.style.top = `${y}px`;
                signEl.onclick = () => scrollToSign(sign.name);
                wheel.appendChild(signEl);
            });
        }

        // Générer les cartes
        function generateCards(filter = 'all') {
            const grid = document.getElementById('signsGrid');
            const filtered = filter === 'all'
                ? zodiacSigns
                : zodiacSigns.filter(s => s.element === filter);

            grid.innerHTML = filtered.map(sign => `
                <div class="sign-card ${sign.element}" id="sign-${sign.name}" onclick="toggleCard(this)">
                    <div class="sign-header">
                        <div class="sign-symbol">${sign.symbol}</div>
                        <div class="sign-info">
                            <h2>${sign.name}</h2>
                            <div class="sign-dates">${sign.dates}</div>
                        </div>
                    </div>

                    <div class="sign-tags">
                        <span class="tag element">${getElementEmoji(sign.element)} ${capitalizeFirst(sign.element)}</span>
                        <span class="tag modality">📍 ${sign.modality}</span>
                        <span class="tag planet">🪐 ${sign.planet}</span>
                    </div>

                    <p class="sign-description">${sign.description}</p>

                    <div class="sign-traits">
                        <div class="traits-column positive">
                            <h4>✅ Qualités</h4>
                            <ul>${sign.positive.map(t => `<li>${t}</li>`).join('')}</ul>
                        </div>
                        <div class="traits-column negative">
                            <h4>⚠️ Défis</h4>
                            <ul>${sign.negative.map(t => `<li>${t}</li>`).join('')}</ul>
                        </div>
                    </div>

                    <div class="sign-details">
                        <h4 style="color: #8b5cf6; margin-bottom: 15px;">📚 Correspondances</h4>
                        <div class="correspondences-grid">
                            <div class="correspondence">
                                <div class="label">Pierre</div>
                                <div class="value">${sign.stone}</div>
                            </div>
                            <div class="correspondence">
                                <div class="label">Couleur</div>
                                <div class="value">${sign.color}</div>
                            </div>
                            <div class="correspondence">
                                <div class="label">Jour</div>
                                <div class="value">${sign.day}</div>
                            </div>
                            <div class="correspondence">
                                <div class="label">Corps</div>
                                <div class="value">${sign.body}</div>
                            </div>
                        </div>

                        <div class="compatibility-section">
                            <h4>💕 Compatible avec</h4>
                            <div class="compat-list">
                                ${sign.compatible.map(c => `<span class="compat-sign">${c}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getElementEmoji(element) {
            const emojis = { fire: '🔥', earth: '🌍', air: '💨', water: '💧' };
            return emojis[element];
        }

        function capitalizeFirst(str) {
            const names = { fire: 'Feu', earth: 'Terre', air: 'Air', water: 'Eau' };
            return names[str] || str;
        }

        function toggleCard(element) {
            element.classList.toggle('expanded');
        }

        function scrollToSign(name) {
            const card = document.getElementById(`sign-${name}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.classList.add('expanded');
            }
        }

        function filterSigns(element) {
            document.querySelectorAll('.element-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            generateCards(element);
        }

        // Init
        generateWheel();
        generateCards();
    </script>
</body>
</html>
